<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commune de Boisset (43) - Site Officiel</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #27ae60;
            --accent: #e67e22;
            --light: #f8f9fa;
            --dark: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
            background-color: #f4f4f4;
            color: var(--dark);
        }

        header {
            background: var(--primary);
            color: white;
            padding: 2rem 1rem;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        nav {
            background: #34495e;
            padding: 10px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
        }

        .container {
            max-width: 1100px;
            margin: 20px auto;
            padding: 0 20px;
        }

        h2 {
            border-bottom: 3px solid var(--secondary);
            padding-bottom: 10px;
            color: var(--primary);
        }

        /* Grille pour les cartes */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
            position: relative;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card.pinned {
            border: 2px solid var(--accent);
        }

        .badge-pinned {
            background: var(--accent);
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            position: absolute;
            top: 10px;
            right: 10px;
        }

        .category {
            color: var(--secondary);
            font-weight: bold;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        .contact-info {
            background: #eef7f1;
            padding: 10px;
            border-radius: 4px;
            font-size: 0.9rem;
            margin-top: 10px;
        }

        /* Formulaire de contact */
        form {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        button {
            background: var(--secondary);
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
        }

        button:hover {
            background: #219150;
        }

        footer {
            text-align: center;
            padding: 40px;
            background: var(--primary);
            color: white;
            margin-top: 50px;
        }

        #status-message {
            margin-top: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<header>
    <h1>Mairie de Boisset</h1>
    <p>Bienvenue sur le portail officiel de notre commune en Haute-Loire</p>
</header>

<nav>
    <a href="#news">Actualités</a>
    <a href="#annuaire">Annuaire</a>
    <a href="#contact">Contact</a>
</nav>

<div class="container">
    
    <section id="news">
        <h2>Dernières Actualités</h2>
        <div id="news-list" class="grid">
            <p>Chargement des actualités...</p>
        </div>
    </section>

    <section id="annuaire">
        <h2>Annuaire Local</h2>
        <div id="directory-list" class="grid">
            <p>Chargement de l'annuaire...</p>
        </div>
    </section>

    <section id="contact">
        <h2>Nous contacter</h2>
        <form id="contact-form">
            <div class="form-group">
                <label for="name">Nom / Prénom</label>
                <input type="text" id="name" required>
            </div>
            <div class="form-group">
                <label for="email">Votre Email</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" rows="5" required></textarea>
            </div>
            <button type="submit">Envoyer le message</button>
            <div id="status-message"></div>
        </form>
    </section>

</div>

<footer>
    <p>&copy; 2026 Mairie de Boisset - 43500</p>
</footer>

<script>
    // Configuration de ta connexion Supabase
    const SUPABASE_URL = 'https://nwrjlkmvdgubifvqbdkx.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_O_CXZsn4-Qo_s2TAuRY0Kw_aW51PWZw';
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // 1. Charger les News
    async function loadNews() {
        const { data, error } = await supabase
            .from('news')
            .select('*')
            .order('is_pinned', { ascending: false })
            .order('created_at', { ascending: false });

        const container = document.getElementById('news-list');
        
        if (error) {
            container.innerHTML = "<p>Erreur lors du chargement des news.</p>";
            return;
        }

        container.innerHTML = '';
        data.forEach(item => {
            const dateStr = new Date(item.created_at).toLocaleDateString('fr-FR');
            container.innerHTML += `
                <div class="card ${item.is_pinned ? 'pinned' : ''}">
                    ${item.is_pinned ? '<span class="badge-pinned">À la une</span>' : ''}
                    <span class="category">${item.category}</span>
                    <h3>${item.title}</h3>
                    <p>${item.content}</p>
                    <small>Publié le ${dateStr}</small>
                </div>
            `;
        });
    }

    // 2. Charger l'Annuaire
    async function loadDirectory() {
        const { data, error } = await supabase
            .from('local_directory')
            .select('*')
            .order('name', { ascending: true });

        const container = document.getElementById('directory-list');
        
        if (error) {
            container.innerHTML = "<p>Erreur lors du chargement de l'annuaire.</p>";
            return;
        }

        container.innerHTML = '';
        data.forEach(item => {
            container.innerHTML += `
                <div class="card">
                    <span class="category">${item.category}</span>
                    <h3>${item.name}</h3>
                    <p>${item.description || ''}</p>
                    <div class="contact-info">
                        <strong>Contact :</strong> ${item.contact_info}
                    </div>
                </div>
            `;
        });
    }

    // 3. Gérer le formulaire de contact
    document.getElementById('contact-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const status = document.getElementById('status-message');
        
        const formData = {
            name: document.getElementById('name').value,
            email: document.getElementById('email').value,
            message: document.getElementById('message').value
        };

        const { error } = await supabase
            .from('contact_requests')
            .insert([formData]);

        if (error) {
            status.style.color = "red";
            status.innerText = "Erreur lors de l'envoi. Réessayez.";
        } else {
            status.style.color = "green";
            status.innerText = "Message envoyé avec succès !";
            document.getElementById('contact-form').reset();
        }
    });

    // Lancement au chargement de la page
    loadNews();
    loadDirectory();
</script>

</body>
</html>
