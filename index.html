<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boisset (43) - Officiel</title>
    <style>
        body { margin: 0; font-family: sans-serif; background: #fdfdfd; }
        .header { background: #1a1a1a; height: 65px; display: flex; justify-content: flex-end; align-items: center; padding: 0 5%; position: relative; }
        .nav a { color: white; text-decoration: none; margin-left: 25px; font-weight: bold; font-size: 13px; text-transform: uppercase; }
        .logo { position: absolute; top: 0; left: 8%; background: white; padding: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); width: 120px; text-align: center; border-radius: 0 0 5px 5px; z-index: 100; }
        .logo img { width: 100%; height: auto; }
        .hero { height: 400px; background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('https://www.ville-boisset.fr/wp-content/uploads/2021/01/fond-entete.jpg') center/cover; border-bottom: 15px solid #8ec63f; position: relative; }
        .skew { background: #8ec63f; height: 50px; width: 110%; position: absolute; bottom: -30px; left: -5%; transform: rotate(-1.5deg); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .content { max-width: 800px; margin: 80px auto; text-align: center; padding: 0 20px; }
        h1 { color: #214316; font-size: 2.5rem; }
    </style>
</head>
<body>
    <div class="logo"><img src="blason.png"></div>
    <header class="header">
        <nav class="nav">
            <a href="#">Mairie</a><a href="#">Vie Locale</a><a href="#" style="color:#8ec63f">Actualités</a>
        </nav>
    </header>
    <section class="hero"><div class="skew"></div></section>
    <main class="content">
        <h1>Bienvenue à Boisset</h1>
        <p>Le futur portail de la commune de Boisset (43).</p>
    </main>
</body>
</html>
