<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boisset (43) - Site Officiel de la Commune</title>
    <style>
        /* CONFIGURATION GÉNÉRALE */
        body { margin: 0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #fdfdfd; color: #333; overflow-x: hidden; }
        
        /* BARRE DE NAVIGATION NOIRE */
        .top-header {
            background: #1a1a1a;
            height: 70px;
            display: flex;
            justify-content: flex-end; /* Pour écarter le menu à droite */
            align-items: center;
            padding: 0 5%;
            position: relative;
            z-index: 100;
            box-shadow: 0 2px 15px rgba(0,0,0,0.4);
        }

        /* TEXTE BIENVENUE TRÈS GROS, À DROITE DU LOGO */
        .welcome-title {
            position: absolute;
            top: 10px; /* Aligné avec le haut du logo */
            left: 310px; /* Placé juste après le logo de 300px */
            color: #f0f0f0; /* Blanc cassé très clair */
            font-size: 4.5rem; /* TAILLE MAXIMALE POUR VISIBILITÉ */
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0;
            z-index: 200;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5)); /* Pour bien se détacher sur le paysage */
        }

        .nav-link {
            color: white;
            text-decoration: none;
            margin-left: 30px;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 1px;
            transition: 0.3s;
        }
        .nav-link:hover { color: #8ec63f; }

        /* LE BLASON (LOGO) - TAILLE 300PX, FLOTTE SANS FOND */
        .logo-box {
            position: absolute;
            top: 10px;
            left: 5px; /* Placé tout à gauche */
            z-index: 200;
            width: 300px;
            filter: drop-shadow(0 8px 25px rgba(0,0,0,0.5));
        }
        .logo-box img { 
            width: 100%; 
            height: auto; 
            display: block; 
        }

        /* SECTION IMAGE DE FOND (HERO) */
        .hero-section {
            position: relative;
            height: 550px;
            background: linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.1)), 
                        url('https://www.ville-boisset.fr/wp-content/uploads/2021/01/fond-entete.jpg') center/cover no-repeat;
            border-bottom: 15px solid #8ec63f;
        }

        /* BARRE VERTE OBLIQUE */
        .skew-bar {
            background: #8ec63f;
            height: 70px;
            width: 110%;
            position: absolute;
            bottom: -40px;
            left: -5%;
            transform: rotate(-2deg);
            z-index: 50;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        /* ZONE DE TEXTE PRINCIPALE (SOUS L'IMAGE) */
        .container {
            max-width: 1000px;
            margin: 100px auto 100px;
            padding: 0 20px;
            text-align: center;
        }

        .decoration { width: 100px; height: 6px; background: #8ec63f; margin: 35px auto; border-radius: 3px; }
        .intro-text { font-size: 1.8rem; color: #214316; line-height: 1.6; font-weight: 400; max-width: 850px; margin: 0 auto; }

        /* ADAPTATION MOBILE (XIAOMI 14T PRO) */
        @media (max-width: 1024px) {
            .logo-box { left: 5%; width: 200px; top: 40px; }
            .welcome-title { display: none; } /* On cache le texte sur mobile pour laisser place au logo */
        }
    </style>
</head>
<body>

    <div class="logo-box">
        <a href="/">
            <img src="blason.png" alt="Blason de Boisset">
        </a>
    </div>

    <header class="top-header">
        <nav>
            <a href="#" class="nav-link">La Mairie</a>
            <a href="#" class="nav-link">Vie Locale</a>
            <a href="#" class="nav-link">Découvrir</a>
            <a href="#" class="nav-link" style="color:#8ec63f">Actualités</a>
        </nav>
    </header>

    <h1 class="welcome-title">Bienvenue à Boisset</h1>

    <section class="hero-section">
        <div class="skew-bar"></div>
    </section>

    <main class="container">
        <div class="decoration"></div>
        <p class="intro-text">
            Découvrez le nouveau portail officiel de notre commune.<br>
            <strong>Nature, Patrimoine et Proximité au cœur de la Haute-Loire.</strong>
        </p>
    </main>

</body>
</html>
