<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boisset (43) - Site Officiel de la Commune</title>
    <style>
        /* CONFIGURATION GÉNÉRALE */
        body { margin: 0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #fdfdfd; color: #333; overflow-x: hidden; }
        
        /* BARRE DE NAVIGATION NOIRE AGRANDIE */
        .top-header {
            background: #1a1a1a;
            height: 120px; /* Plus haut pour contenir le gros texte */
            display: flex;
            justify-content: flex-end; 
            align-items: center;
            padding: 0 5%;
            position: relative;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        /* TEXTE BIENVENUE AJUSTÉ DANS LE BANDEAU */
        .welcome-title {
            position: absolute;
            top: 50%; /* Centrage vertical */
            transform: translateY(-50%);
            left: 330px; /* Juste après le blason */
            color: #f8f8f8; /* Blanc très pur */
            font-size: 4rem; 
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin: 0;
            z-index: 200;
            white-space: nowrap; /* Empêche le texte de revenir à la ligne */
        }

        .nav-link {
            color: white;
            text-decoration: none;
            margin-left: 30px;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 1px;
            transition: 0.3s;
        }
        .nav-link:hover { color: #8ec63f; }

        /* LE BLASON (LOGO) - REPOSITIONNÉ POUR NE PAS ÊTRE COUPÉ */
        .logo-box {
            position: absolute;
            top: 10px;
            left: 20px; /* Décalé du bord gauche pour éviter la coupure */
            z-index: 210;
            width: 300px;
            filter: drop-shadow(0 8px 25px rgba(0,0,0,0.6));
        }
        .logo-box img { 
            width: 100%; 
            height: auto; 
            display: block; 
        }

        /* SECTION IMAGE DE FOND (HERO) */
        .hero-section {
            position: relative;
            height: 500px;
            background: linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.1)), 
                        url('https://www.ville-boisset.fr/wp-content/uploads/2021/01/fond-entete.jpg') center/cover no-repeat;
            border-bottom: 15px solid #8ec63f;
        }

        /* BARRE VERTE OBLIQUE */
        .skew-bar {
            background: #8ec63f;
            height: 70px;
            width: 110%;
            position: absolute;
            bottom: -40px;
            left: -5%;
            transform: rotate(-2deg);
            z-index: 50;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        /* ZONE DE TEXTE PRINCIPALE */
        .container {
            max-width: 1000px;
            margin: 100px auto 100px;
            padding: 0 20px;
            text-align: center;
        }

        .decoration { width: 100px; height: 6px; background: #8ec63f; margin: 35px auto; border-radius: 3px; }
        .intro-text { font-size: 1.8rem; color: #214316; line-height: 1.6; font-weight: 400; max-width: 850px; margin: 0 auto; }

        /* ADAPTATION MOBILE */
        @media (max-width: 1100px) {
            .welcome-title { font-size: 2.5rem; left: 240px; }
            .logo-box { width: 200px; }
        }
        @media (max-width: 768px) {
            .welcome-title { display: none; }
            .top-header { height: 80px; }
            .logo-box { width: 120px; top: 5px; }
        }
    </style>
</head>
<body>

    <header class="top-header">
        <h1 class="welcome-title">Bienvenue à Boisset</h1>
        
        <nav>
            <a href="#" class="nav-link">La Mairie</a>
            <a href="#" class="nav-link">Vie Locale</a>
            <a href="#" class="nav-link">Découvrir</a>
            <a href="#" class="nav-link" style="color:#8ec63f">Actualités</a>
        </nav>
    </header>

    <div class="logo-box">
        <a href="/">
            <img src="blason.png" alt="Blason de Boisset">
        </a>
    </div>

    <section class="hero-section">
        <div class="skew-bar"></div>
    </section>

    <main class="container">
        <div class="decoration"></div>
        <p class="intro-text">
            Découvrez le nouveau portail officiel de notre commune.<br>
            <strong>Nature, Patrimoine et Proximité au cœur de la Haute-Loire.</strong>
        </p>
    </main>

</body>
</html>
