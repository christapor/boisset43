<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>ADMIN - La Jourdane</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 30px; background: #f4f7f6; color: #333; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 30px; }
        h1, h2 { color: #0055A4; margin-top: 0; }
        
        /* Style du formulaire d'ajout rapide */
        .quick-add { display: flex; gap: 10px; align-items: flex-end; background: #e8f0fe; padding: 15px; border-radius: 8px; }
        .quick-add div { display: flex; flex-direction: column; gap: 5px; }
        input { padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 15px; border-bottom: 1px solid #ddd; text-align: left; }
        th { background: #0055A4; color: white; }
        
        .btn { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-green { background: #228B22; color: white; }
        .btn-blue { background: #0055A4; color: white; }
        .btn:hover { opacity: 0.9; }
    </style>
</head>
<body>

    <div class="card">
        <h2>➕ Réservation au guichet</h2>
        <p style="font-size: 0.9rem; margin-bottom: 15px;"><em>Utilisez ceci quand quelqu'un vient physiquement à la mairie. La date passera directement en ROUGE.</em></p>
        <div class="quick-add">
            <div>
                <label>Date :</label>
                <input type="date" id="manual-date">
            </div>
            <div>
                <label>Nom de la personne :</label>
                <input type="text" id="manual-name" placeholder="Ex: M. Martin">
            </div>
            <button class="btn btn-blue" onclick="ajouterManuel()">BLOQUER LA SALLE</button>
        </div>
    </div>

    <div class="card">
        <h2>📩 Demandes reçues par le site (Orange)</h2>
        <table id="admin-table">
            <thead>
                <tr>
                    <th>Date demandée</th>
                    <th>Nom</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="admin-body">
                </tbody>
        </table>
    </div>

    <script>
        const SUPABASE_URL = 'https://nwrjlkmvdgubifvqbdkx.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_O_CXZsn4-Qo_s2TAuRY0Kw_aW51PWZw';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Charger les demandes en attente
        async function load() {
            const { data } = await sb.from('salle_reservations').select('*').eq('status', 'en_cours');
            const body = document.getElementById('admin-body');
            body.innerHTML = data.length ? '' : '<tr><td colspan="3" style="text-align:center;">Aucune demande web en attente.</td></tr>';
            data.forEach(r => {
                body.innerHTML += `<tr>
                    <td><strong>${r.date_debut}</strong></td>
                    <td>${r.nom_client}</td>
                    <td><button class="btn btn-green" onclick="valider('${r.id}', '${r.date_debut}')">CONFIRMER</button></td>
                </tr>`;
            });
        }

        // Valider une demande orange -> rouge
        async function valider(id, date) {
            await sb.from('salle_reservations').update({ status: 'confirmé' }).eq('id', id);
            alert("RÉUSSI !\n1. La date est maintenant ROUGE sur le site.\n2. ÉCRIVEZ DANS LE REGISTRE PAPIER.");
            load();
        }

        // Ajouter manuellement (Directement en rouge)
        async function ajouterManuel() {
            const date = document.getElementById('manual-date').value;
            const nom = document.getElementById('manual-name').value;

            if(!date || !nom) {
                alert("Veuillez remplir la date et le nom.");
                return;
            }

            const { error } = await sb.from('salle_reservations').insert([
                { date_debut: date, nom_client: nom, status: 'confirmé' }
            ]);

            if(!error) {
                alert("SÉCURISÉ !\n1. La date a été bloquée en ROUGE sur le site.\n2. ÉCRIVEZ DANS LE REGISTRE PAPIER.");
                document.getElementById('manual-date').value = '';
                document.getElementById('manual-name').value = '';
                load();
            } else {
                alert("Erreur : Cette date est peut-être déjà prise.");
            }
        }

        load();
    </script>
</body>
</html>
